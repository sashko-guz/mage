services:
  mage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mage-server
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    volumes:
      # Mount storage configuration
      - ./storage.docker.json:/app/storage.json:ro
      # Mount local storage data (portable relative paths)
      - ./.data:/app/.data
      # Mount cache directories
      - ./.cache:/app/.cache
    working_dir: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${DOCKER_MEMORY_LIMIT:-2g}
          cpus: "${DOCKER_CPU_LIMIT:-0}"
