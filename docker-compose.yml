services:
  mage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mage-server
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
      - VIPS_WARNING=0
    volumes:
      # Mount .env file for environment variables
      - ./.env:/app/.env:ro
      # Mount storage configuration
      - ./storage.docker.json:/app/storage.json:ro
      # Mount local storage data (portable relative paths)
      - ./.data:/app/.data
      # Mount cache directories
      - ./.cache:/app/.cache
    working_dir: /app
    restart: unless-stopped
